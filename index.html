  // ---- math helpers ----
  function cl(v,a,b){ return Math.max(a, Math.min(b, v)); }
  function ease(t){ return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2; }
  function easeOutBack(t){ var c1=1.70158, c3=c1+1; return 1 + c3*Math.pow(t-1,3) + c1*Math.pow(t-1,2); }
  function along(wps, prog){

    for (i=0;i<wps.length-1;i++){ var L=Math.hypot(wps[i+1][0]-wps[i][0], wps[i+1][1]-wps[i][1]); segs.push(L); total+=L; }
    var d = p*total;
    for (i=0;i<segs.length;i++){
      if (d <= segs[i] || i === segs.length-1){ var f = segs[i] ? d/segs[i] : 0;

    }
    return wps[wps.length-1];
  }
  function bumpTransform(cx, cy, u){
    var grow=Math.sin(u*Math.PI), s=1+0.055*grow, decay=1-u;
    var jx=Math.sin(u*Math.PI*11)*2.0*decay, jy=Math.cos(u*Math.PI*13)*1.6*decay, rot=Math.sin(u*Math.PI*9)*1.1*decay;
    return "translate("+(cx+jx).toFixed(2)+","+(cy+jy).toFixed(2)+") rotate("+rot.toFixed(2)+") scale("+s.toFixed(4)+") translate("+(-cx).toFixed(2)+","+(-cy).toFixed(2)+")";
  }

  // ---- element builders ----
  function bill(x,y,rot){
    return S("g",{transform:"translate("+x.toFixed(2)+","+y.toFixed(2)+") rotate("+rot+")"},[
      S("rect",{x:-18,y:-11.5,width:36,height:23,rx:3.5,fill:billColor,stroke:"rgba(0,0,0,0.28)","stroke-width":0.7}),
      S("rect",{x:-13.5,y:-7.5,width:27,height:15,rx:2,fill:"none",stroke:"#FFFFFF","stroke-width":0.7,opacity:0.7}),
      S("circle",{cx:0,cy:0,r:5.5,fill:"none",stroke:"#FFFFFF","stroke-width":1}),
      S("line",{x1:-14,y1:-8,x2:-9.5,y2:-8,stroke:"#FFFFFF","stroke-width":1,"stroke-linecap":"round"}),
      S("line",{x1:9.5,y1:8,x2:14,y2:8,stroke:"#FFFFFF","stroke-width":1,"stroke-linecap":"round"})
    ]);
  }
  function pulse(x,y,color,rr){
    var r = rr || 1;
    return S("g",{transform:"translate("+x.toFixed(2)+","+y.toFixed(2)+")"},[
      S("circle",{r:26*r,fill:color,opacity:0.10}),
      S("circle",{r:15*r,fill:color,opacity:0.22}),
      S("circle",{r:8*r,fill:color,opacity:0.95}),
      S("circle",{r:3.2,fill:"#FFFFFF",opacity:0.95})
    ]);
  }
  function sign(cx,cy,kind,color,op,u){
    var jx=0,jy=0,rot=0,sc=1;
    if (u >= 0){ var grow=Math.sin(u*Math.PI); sc=1+0.055*grow; var decay=1-u;
      jx=Math.sin(u*Math.PI*11)*2.0*decay; jy=Math.cos(u*Math.PI*13)*1.6*decay; rot=Math.sin(u*Math.PI*9)*1.1*decay; }
    var label = kind === "+" ? "Credit" : "Debit";
    var w = kind === "+" ? 82 : 72;
    return S("g",{transform:"translate("+(cx+jx).toFixed(2)+","+(cy+jy).toFixed(2)+") rotate("+rot.toFixed(2)+") scale("+sc.toFixed(3)+")",opacity:op},[
      S("rect",{x:-w/2,y:-15,width:w,height:30,rx:15,ry:15,fill:color,stroke:"#FFFFFF","stroke-width":2}),

  }
  function paidPill(op,sc){
    return S("g",{transform:"translate(1703,788) scale("+sc.toFixed(3)+")",opacity:op},[
      S("image",{href:PAID_URI,x:-67,y:-27.5,width:134,height:55})

  }

  // ---- per-frame composition ----
  function compute(t, loops){
    var els = [], bumps = ["","","","","",""], i;
    var payCycle = Math.floor(t/5);
    var payTarget = PAY_SEQ[(payCycle+loops)%6];
    var _rot = loops%6;
    var fundCount = FUND_COUNTS[_rot];
    var fundTargets = FUND_SEQ.slice(_rot).concat(FUND_SEQ.slice(0,_rot)).slice(0,fundCount);

    }

    }

    if (payActive && tp >= 4.3 && tp <= 4.95){ var opP=cl((tp-4.3)/0.18,0,1); if (tp>4.7) opP*=cl((4.95-tp)/0.25,0,1); var scP=0.8+0.2*easeOutBack(cl((tp-4.3)/0.3,0,1)); els.push(paidPill(opP,scP)); }

    if (payActive && tp >= 0.85 && tp <= 1.27){ var uBp=(tp-0.85)/0.42; bumps[payTarget]=bumpTransform(HEX[payTarget][0],HEX[payTarget][1],uBp); }

    return { els: els, bumps: bumps };
  }

  // ---- DOM refs ----

  var hexes = []; Array.prototype.forEach.call(document.querySelectorAll(".hex"), function(g){ hexes[+g.getAttribute("data-i")] = g; });
